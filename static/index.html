<!doctype html>
<html lang="pt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Alma</title>
<link rel="icon" type="image/jpeg" href="/avatar.jpg">
<style>
  :root {
    --bg: #f7f6f3;
    --panel: #ffffff;
    --sidebar: #efece6;
    --text: #2b2926;
    --text-dim: #6b6862;
    --border: #e6e3dd;
    --accent: #c3684a;
    --accent-text: #ffffff;
    --bubble-user: #eeece7;
    --bubble-assistant: #ffffff;
    --error: #b3413a;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1d1c1a;
      --panel: #262523;
      --sidebar: #201f1d;
      --text: #ece9e4;
      --text-dim: #9a968f;
      --border: #3a3835;
      --accent: #d97757;
      --accent-text: #1d1c1a;
      --bubble-user: #333130;
      --bubble-assistant: #262523;
      --error: #e08078;
    }
  }
  * { box-sizing: border-box; }
  html, body {
    height: 100%;
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }
  #app {
    height: 100%;
    display: flex;
  }

  #sidebar {
    width: 260px;
    flex-shrink: 0;
    overflow: hidden;
    background: var(--sidebar);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    transition: width 0.18s ease, border-color 0.18s ease;
  }
  #sidebar.collapsed { width: 0; border-color: transparent; }
  #sidebar > * { width: 260px; flex-shrink: 0; }
  .new-chat {
    margin: 14px;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    cursor: pointer;
    font-size: 13.5px;
    font-family: inherit;
    text-align: left;
  }
  .new-chat:hover { background: var(--bubble-user); }
  .logout-btn {
    margin: 8px 14px 14px;
    padding: 9px 12px;
    border-radius: 10px;
    border: none;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
    text-align: left;
    flex-shrink: 0;
  }
  .logout-btn:hover { background: var(--bubble-user); color: var(--error); }
  #sessions-list {
    flex: 1;
    overflow-y: auto;
    padding: 0 8px 12px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .session-item {
    padding: 9px 6px 9px 10px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .session-item:hover { background: var(--bubble-user); color: var(--text); }
  .session-item.active { background: var(--bubble-user); color: var(--text); font-weight: 600; }
  .session-item .session-title {
    flex: 1;
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .session-item .delete-btn {
    flex-shrink: 0;
    border: none;
    background: transparent;
    color: var(--text-dim);
    width: 20px;
    height: 20px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 13px;
    line-height: 1;
    visibility: hidden;
  }
  .session-item:hover .delete-btn { visibility: visible; }
  .session-item .delete-btn:hover { background: var(--border); color: var(--error); }
  .sessions-empty {
    padding: 10px 14px;
    font-size: 12px;
    color: var(--text-dim);
  }

  #main-col {
    flex: 1;
    min-width: 0;
    height: 100%;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .icon-btn {
    border: none;
    background: transparent;
    color: var(--text-dim);
    font-size: 16px;
    cursor: pointer;
    padding: 4px 6px;
    border-radius: 6px;
    line-height: 1;
  }
  .icon-btn:hover { background: var(--bubble-user); color: var(--text); }
  header .logo {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    object-fit: cover;
    display: block;
  }
  header h1 {
    font-size: 15px;
    font-weight: 600;
    margin: 0;
  }
  header .sub {
    font-size: 12px;
    color: var(--text-dim);
    margin-left: auto;
  }
  header input {
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-size: 12px;
    text-align: right;
    width: 90px;
  }
  header input:focus { outline: none; color: var(--text); }

  .identidade-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.45);
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  .identidade-overlay:not([hidden]) { display: flex; }
  .identidade-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px 26px 28px;
    width: min(380px, 90vw);
    text-align: center;
  }
  .identidade-card video {
    width: 100%;
    border-radius: 12px;
    margin: 0 0 16px;
    display: block;
    background: var(--sidebar);
  }
  .identidade-card h2 { margin: 0 0 6px; font-size: 16px; }
  .identidade-card p { margin: 0 0 16px; font-size: 12.5px; color: var(--text-dim); line-height: 1.5; }
  .identidade-card form { display: flex; flex-direction: column; gap: 10px; }
  .identidade-card input {
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
  }
  .identidade-card input:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
  .identidade-card button {
    padding: 10px 12px;
    border-radius: 10px;
    border: none;
    background: var(--accent);
    color: var(--accent-text);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px 8px;
  }
  #messages-inner {
    max-width: 720px;
    margin: 0 auto;
    min-height: 100%;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  .empty-state {
    margin: auto;
    text-align: center;
    color: var(--text-dim);
    font-size: 14px;
  }
  .msg {
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }
  .msg .avatar {
    width: 26px;
    height: 26px;
    border-radius: 7px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    margin-top: 2px;
    overflow: hidden;
  }
  .msg .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .msg.user .avatar { background: var(--bubble-user); color: var(--text); }
  .msg.assistant .avatar { background: var(--accent); color: var(--accent-text); }
  .msg-content {
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 0;
    flex: 1;
  }
  .msg-actions {
    display: flex;
    gap: 2px;
    padding-left: 2px;
  }
  .msg-action-btn {
    border: none;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 12px;
    padding: 3px 7px;
    border-radius: 6px;
    line-height: 1;
  }
  .msg-action-btn:hover { background: var(--bubble-user); color: var(--text); }
  .bubble {
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 14.5px;
    line-height: 1.55;
    white-space: pre-wrap;
    word-wrap: break-word;
    max-width: 100%;
  }
  .msg.user .bubble { background: var(--bubble-user); }
  .msg.assistant .bubble { background: var(--bubble-assistant); border: 1px solid var(--border); }
  .msg.error .bubble { background: transparent; border: 1px solid var(--error); color: var(--error); }

  .bubble p { margin: 0 0 8px; }
  .bubble p:last-child { margin-bottom: 0; }
  .bubble ul, .bubble ol { margin: 4px 0 8px; padding-left: 22px; }
  .bubble li { margin-bottom: 3px; }
  .bubble h3, .bubble h4, .bubble h5 { margin: 10px 0 4px; font-size: 1em; }
  .bubble strong { font-weight: 700; }
  .bubble a { color: var(--accent); }
  .bubble code {
    background: var(--bubble-user);
    padding: 1px 5px;
    border-radius: 4px;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 0.9em;
  }
  .bubble pre {
    background: var(--bubble-user);
    padding: 10px 12px;
    border-radius: 8px;
    overflow-x: auto;
    margin: 6px 0;
  }
  .bubble pre code { background: none; padding: 0; }
  .bubble .table-wrap {
    overflow-x: auto;
    margin: 6px 0;
  }
  .bubble table {
    border-collapse: collapse;
    width: 100%;
    font-size: 0.92em;
    white-space: normal;
  }
  .bubble th, .bubble td {
    border: 1px solid var(--border);
    padding: 6px 10px;
    text-align: left;
  }
  .bubble th { background: var(--bubble-user); font-weight: 600; }

  .typing-wrap {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 4px 0;
  }
  .typing-label {
    font-size: 0.85em;
    color: var(--text-dim);
  }
  .typing {
    display: inline-flex;
    gap: 4px;
  }
  .typing span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-dim);
    animation: bounce 1.2s infinite ease-in-out;
  }
  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-4px); opacity: 1; }
  }

  #composer {
    padding: 14px 20px 20px;
    flex-shrink: 0;
  }
  .composer-inner {
    max-width: 720px;
    margin: 0 auto;
  }
  #composer form {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 8px 8px 8px 16px;
  }
  #composer textarea {
    flex: 1;
    border: none;
    resize: none;
    background: transparent;
    color: var(--text);
    font-family: inherit;
    font-size: 14.5px;
    line-height: 1.5;
    max-height: 160px;
    padding: 6px 0;
  }
  #composer textarea:focus { outline: none; }
  #composer button {
    border: none;
    background: var(--accent);
    color: var(--accent-text);
    width: 34px;
    height: 34px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  #composer button:disabled { opacity: 0.4; cursor: default; }
  #composer .hint {
    text-align: center;
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 8px;
  }
  .icon-btn-composer {
    background: transparent !important;
    color: var(--text-dim) !important;
    width: 30px !important;
    height: 34px !important;
    font-size: 17px !important;
  }
  .icon-btn-composer:hover { color: var(--text) !important; }
  .icon-btn-composer.a-gravar { color: var(--error) !important; animation: pulsar 1s infinite; }
  @keyframes pulsar {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.45; }
  }
  .reuniao-banner:not([hidden]) {
    display: flex;
  }
  .reuniao-banner {
    align-items: center;
    gap: 10px;
    padding: 8px 16px;
    background: var(--error);
    color: #fff;
    font-size: 13px;
    flex-shrink: 0;
  }
  .reuniao-banner span:nth-of-type(2) { flex: 1; }
  .reuniao-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: #fff;
    flex-shrink: 0;
    animation: pulsar 1s infinite;
  }
  .reuniao-banner button {
    background: rgba(255, 255, 255, 0.2) !important;
    color: #fff !important;
    border: none;
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 12px;
    cursor: pointer;
    flex-shrink: 0;
  }
  .reuniao-banner button:hover { background: rgba(255, 255, 255, 0.32) !important; }
  .anexo-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 8px;
  }
  .anexo-chips:empty { display: none; margin-bottom: 0; }
  .anexo-chip {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 6px 10px;
    font-size: 13px;
    color: var(--text);
    max-width: fit-content;
  }
  .anexo-chip button {
    border: none;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 12px;
    padding: 0;
  }
  .anexo-chip button:hover { color: var(--text); }
  .anexos-imagem {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 6px;
  }
  .anexo-imagem-preview {
    max-width: 180px;
    max-height: 180px;
    border-radius: 10px;
    border: 1px solid var(--border);
    cursor: pointer;
    object-fit: cover;
  }

  #sidebar-scrim {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.35);
    z-index: 55;
  }
  #sidebar-scrim.visible { display: block; }

  @media (max-width: 768px) {
    #app { position: relative; overflow: hidden; }
    #sidebar {
      /* começa abaixo do header (nunca por cima) — evita qualquer disputa de
         z-index com o botão ☰ ou com o resto do cabeçalho */
      position: fixed;
      top: var(--header-h, 52px);
      bottom: 0;
      left: 0;
      z-index: 60;
      width: min(300px, 82vw);
      box-shadow: 2px 0 24px rgba(0, 0, 0, 0.3);
    }
    #sidebar.collapsed { width: 0; box-shadow: none; }
    #sidebar > * { width: min(300px, 82vw); }
    #sidebar-scrim { top: var(--header-h, 52px); }

    header { padding: 10px 14px; gap: 8px; }
    header h1 { font-size: 14px; }
    header .sub { font-size: 10.5px; }
    header .sub input { width: 56px; }

    #messages { padding: 16px 12px 8px; }
    #messages-inner { max-width: 100%; }
    .bubble { font-size: 14px; }

    #composer { padding: 10px 12px 16px; }
    .composer-inner { max-width: 100%; }
    /* 16px evita o Safari/iOS ampliar a página ao focar o campo */
    #composer textarea, .identidade-card input { font-size: 16px; }
    #composer button, .icon-btn-composer { width: 38px; height: 38px; }
  }
</style>
</head>
<body>
  <div id="identidade-overlay" class="identidade-overlay" hidden>
    <div class="identidade-card">
      <video src="/apresentacao.mp4" autoplay loop muted playsinline controls></video>
      <h2>Como te chamas?</h2>
      <p>Isto identifica as tuas conversas na barra lateral — só tu as vês.</p>
      <form id="identidade-form">
        <input id="identidade-input" type="text" placeholder="O teu nome" maxlength="40" required>
        <button type="submit">Continuar</button>
      </form>
    </div>
  </div>
  <div id="app">
    <aside id="sidebar">
      <button id="new-chat" class="new-chat" type="button">+ Nova conversa</button>
      <div id="sessions-list">
        <div class="sessions-empty">Sem conversas anteriores.</div>
      </div>
      <button id="logout-btn" class="logout-btn" type="button">Sair</button>
    </aside>
    <div id="sidebar-scrim"></div>
    <div id="main-col">
      <header>
        <button id="menu-toggle" class="icon-btn" type="button" aria-label="Mostrar/ocultar histórico">☰</button>
        <img class="logo" src="/avatar.jpg" alt="Alma">
        <h1>Alma</h1>
        <span class="sub"><span id="utilizador-label"></span> · sessão <input id="sessao-label" type="text" readonly></span>
      </header>
      <div id="reuniao-banner" class="reuniao-banner" hidden>
        <span class="reuniao-dot"></span>
        <span id="reuniao-status">A Alma está a ouvir a reunião — só responde se for chamada pelo nome.</span>
        <button id="reuniao-terminar" type="button">Terminar reunião</button>
      </div>
      <div id="messages">
        <div id="messages-inner">
          <div class="empty-state">Escreve uma pergunta para começares a testar a Alma.</div>
        </div>
      </div>
      <div id="composer">
        <div class="composer-inner">
          <div id="anexo-chips" class="anexo-chips"></div>
          <form id="form">
            <button id="anexar" type="button" class="icon-btn-composer" aria-label="Anexar ficheiro">📎</button>
            <input id="ficheiro-input" type="file" hidden multiple accept=".pdf,.docx,.txt,.csv,.md,image/jpeg,image/png,image/gif,image/webp">
            <button id="reuniao-btn" type="button" class="icon-btn-composer" aria-label="Modo reunião" title="Começar/terminar modo reunião">🎙️</button>
            <textarea id="input" rows="1" placeholder="Escreve uma mensagem..." autofocus></textarea>
            <button id="send" type="submit" aria-label="Enviar">➤</button>
          </form>
          <div class="hint">Enter para enviar · Shift+Enter para nova linha</div>
        </div>
      </div>
    </div>
  </div>

<script>
(function () {
  let UTILIZADOR = localStorage.getItem("alma_utilizador");

  let sessao = sessionStorage.getItem("alma_sessao");
  if (!sessao) {
    sessao = "web-" + Math.random().toString(36).slice(2, 10);
    sessionStorage.setItem("alma_sessao", sessao);
  }

  const utilizadorLabel = document.getElementById("utilizador-label");
  const scrollContainer = document.getElementById("messages");
  const messagesInner = document.getElementById("messages-inner");
  const form = document.getElementById("form");
  const input = document.getElementById("input");
  const sendBtn = document.getElementById("send");
  const sessaoLabel = document.getElementById("sessao-label");
  const sidebar = document.getElementById("sidebar");
  const sidebarScrim = document.getElementById("sidebar-scrim");
  const menuToggle = document.getElementById("menu-toggle");
  const newChatBtn = document.getElementById("new-chat");
  const sessionsList = document.getElementById("sessions-list");
  const logoutBtn = document.getElementById("logout-btn");

  logoutBtn.addEventListener("click", () => {
    if (!confirm("Sair da sessão? Da próxima vez vais ter de introduzir o teu nome outra vez.")) return;
    localStorage.removeItem("alma_utilizador");
    sessionStorage.removeItem("alma_sessao");
    location.reload();
  });

  const isMobile = () => window.matchMedia("(max-width: 768px)").matches;

  const headerEl = document.querySelector("header");
  function atualizarAlturaHeader() {
    document.documentElement.style.setProperty("--header-h", headerEl.offsetHeight + "px");
  }
  atualizarAlturaHeader();
  window.addEventListener("resize", atualizarAlturaHeader);

  function abrirSidebar() {
    sidebar.classList.remove("collapsed");
    if (isMobile()) sidebarScrim.classList.add("visible");
  }
  function fecharSidebar() {
    sidebar.classList.add("collapsed");
    sidebarScrim.classList.remove("visible");
  }
  if (isMobile()) sidebar.classList.add("collapsed");  // no telemóvel começa fechada
  sidebarScrim.addEventListener("click", fecharSidebar);
  const anexarBtn = document.getElementById("anexar");
  const ficheiroInput = document.getElementById("ficheiro-input");
  const anexoChips = document.getElementById("anexo-chips");
  let ficheirosAnexados = [];

  // fila de reprodução — as frases de voz vão chegando uma a uma (por SSE) e
  // têm de tocar em sequência, mesmo que a síntese da frase seguinte já
  // tenha chegado antes de a anterior acabar de tocar
  const filaAudio = [];
  let aTocarAudio = false;
  let urlAudioAtual = null;

  // um único elemento <audio>, reutilizado para toda a reprodução — no iOS
  // Safari, criar um "new Audio(url)" a cada frase nunca chega a tocar: o
  // desbloqueio de autoplay dado por um gesto do utilizador só vale para o
  // MESMO elemento em que o play() aconteceu dentro desse gesto, não para
  // elementos criados depois (quando o áudio da resposta chega, já fora do
  // gesto, por streaming). Por isso o mesmo elemento é desbloqueado uma vez
  // (ver desbloquearAudio) e depois só se lhe troca o "src".
  const audioPlayerEl = new Audio();
  audioPlayerEl.playsInline = true;
  let audioDesbloqueado = false;
  // wav silencioso mínimo, só para o desbloqueio — tem de ser uma reprodução
  // real (não um elemento sem "src"), senão o iOS não conta como interação
  // válida para desbloquear reproduções futuras deste elemento
  const SILENCIO_WAV = "data:audio/wav;base64,UklGRjQAAABXQVZFZm10IBAAAAABAAEAQB8AAIA+AAACABAAZGF0YRAAAAAAAAAAAAAAAAAAAAAAAAAA";

  function desbloquearAudio() {
    if (audioDesbloqueado) return;
    audioDesbloqueado = true;
    audioPlayerEl.src = SILENCIO_WAV;
    audioPlayerEl.play().catch(() => {});
  }

  function enfileirarAudio(base64) {
    const binario = atob(base64);
    const bytes = new Uint8Array(binario.length);
    for (let i = 0; i < binario.length; i++) bytes[i] = binario.charCodeAt(i);
    const url = URL.createObjectURL(new Blob([bytes], { type: "audio/mpeg" }));
    filaAudio.push(url);
    tocarProximoAudio();
  }

  function tocarProximoAudio() {
    if (aTocarAudio || filaAudio.length === 0) return;
    aTocarAudio = true;
    const url = filaAudio.shift();
    urlAudioAtual = url;
    const seguinte = () => {
      URL.revokeObjectURL(url);
      if (urlAudioAtual === url) urlAudioAtual = null;
      aTocarAudio = false;
      tocarProximoAudio();
    };
    audioPlayerEl.onended = seguinte;
    audioPlayerEl.onerror = seguinte;
    audioPlayerEl.src = url;
    audioPlayerEl.play().catch(seguinte);
  }

  // corta a fala imediatamente (usado quando a Alma é chamada de novo a
  // meio de uma resposta anterior — ela deve parar de falar já, não acabar
  // a resposta antiga primeiro)
  function pararReproducaoAudio() {
    filaAudio.splice(0).forEach((url) => URL.revokeObjectURL(url));
    if (urlAudioAtual) {
      audioPlayerEl.pause();
      URL.revokeObjectURL(urlAudioAtual);
      urlAudioAtual = null;
    }
    aTocarAudio = false;
  }

  // modo reunião — em vez de push-to-talk, a Alma ouve em excertos curtos e
  // contínuos; só entra na conversa quando alguém a chama pelo nome. O
  // excerto seguinte começa a gravar logo que o anterior termina (sem
  // esperar pela resposta de rede), para não perder o que se diz entretanto.
  const reuniaoBtn = document.getElementById("reuniao-btn");
  const reuniaoBanner = document.getElementById("reuniao-banner");
  const reuniaoStatusEl = document.getElementById("reuniao-status");
  const reuniaoTerminarBtn = document.getElementById("reuniao-terminar");
  let reuniaoAtiva = false;
  let reuniaoStreamMic = null;
  let reuniaoRecorder = null;
  const DURACAO_EXCERTO_REUNIAO_MS = 8000;
  // enquanto está a falar, grava em excertos mais curtos — é o que permite
  // detetar rapidamente que foi chamada de novo (para interromper), em vez
  // de só ao fim dos 8 segundos habituais
  const DURACAO_EXCERTO_A_RESPONDER_MS = 2500;
  // cada excerto é enviado ao servidor assim que fica pronto (em paralelo,
  // sem esperar pelos anteriores) — uma reunião longa ou muito faladora não
  // pode ficar à espera de uma resposta lenta antes de processar o que se
  // disse a seguir. A ordem correta na transcrição acumulada é garantida
  // por um índice (não pela ordem de chegada da rede).
  let proximoIndiceExcerto = 0;
  let excertosProcessados = 0;
  let respondendoAtivo = false;
  // conta as respostas "ao vivo" que vão começando — usado para um evento
  // de áudio tardio de uma resposta já interrompida não voltar a tocar
  // depois de a fala ter sido cortada
  let geracaoRespostaCliente = 0;

  function atualizarEstadoReuniao() {
    reuniaoStatusEl.textContent = respondendoAtivo
      ? "A Alma está a responder… (chama-a outra vez para a interromper)"
      : `A Alma está a ouvir a reunião (${excertosProcessados} excerto(s) processados) — só responde se for chamada pelo nome.`;
  }

  async function iniciarModoReuniao() {
    if (reuniaoAtiva) return;
    // tem de ser a primeira coisa a acontecer, ainda antes de qualquer
    // await — é o que mantém isto dentro do mesmo gesto do utilizador (o
    // clique no botão) que o iOS Safari exige para desbloquear autoplay
    desbloquearAudio();
    try {
      reuniaoStreamMic = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch (_) {
      addMessage("error", "Não consegui aceder ao microfone — verifica as permissões do browser.");
      return;
    }
    reuniaoStreamMic.getAudioTracks()[0].addEventListener("ended", () => {
      if (reuniaoAtiva) {
        addMessage("error", "Perdi o acesso ao microfone — terminei o modo reunião.");
        pararModoReuniao();
      }
    });
    try {
      await fetch("/alma/reuniao/iniciar", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: new URLSearchParams({ sessao })
      });
    } catch (_) {
      addMessage("error", "Não consegui começar o modo reunião — falha de rede.");
      reuniaoStreamMic.getTracks().forEach((t) => t.stop());
      reuniaoStreamMic = null;
      return;
    }
    reuniaoAtiva = true;
    proximoIndiceExcerto = 0;
    excertosProcessados = 0;
    respondendoAtivo = false;
    reuniaoBtn.classList.add("a-gravar");
    reuniaoBtn.textContent = "🔴";
    reuniaoBanner.hidden = false;
    atualizarEstadoReuniao();
    gravarProximoExcertoReuniao();
  }

  function gravarProximoExcertoReuniao() {
    if (!reuniaoAtiva || !reuniaoStreamMic) return;
    const indice = proximoIndiceExcerto++;
    const mime = MediaRecorder.isTypeSupported("audio/webm;codecs=opus") ? "audio/webm;codecs=opus"
               : MediaRecorder.isTypeSupported("audio/webm") ? "audio/webm" : "audio/mp4";
    const rec = new MediaRecorder(reuniaoStreamMic, { mimeType: mime });
    const pedacos = [];
    rec.addEventListener("dataavailable", (e) => { if (e.data && e.data.size > 0) pedacos.push(e.data); });
    rec.addEventListener("stop", () => {
      const blob = new Blob(pedacos, { type: rec.mimeType });
      if (reuniaoAtiva) {
        gravarProximoExcertoReuniao();  // continua a ouvir já, sem esperar pelo envio deste excerto
      } else if (reuniaoStreamMic) {
        reuniaoStreamMic.getTracks().forEach((t) => t.stop());
        reuniaoStreamMic = null;
      }
      enviarExcertoReuniao(blob, indice);  // enviado logo, em paralelo com o próximo excerto
    });
    rec.addEventListener("error", (e) => {
      console.error("Erro no MediaRecorder do modo reunião:", e.error || e);
      if (reuniaoAtiva) gravarProximoExcertoReuniao();  // não deixa a escuta morrer em silêncio
    });
    reuniaoRecorder = rec;
    try {
      rec.start();
    } catch (e) {
      console.error("Falha ao iniciar a gravação de um excerto:", e);
      if (reuniaoAtiva) setTimeout(gravarProximoExcertoReuniao, 500);
      return;
    }
    const duracao = respondendoAtivo ? DURACAO_EXCERTO_A_RESPONDER_MS : DURACAO_EXCERTO_REUNIAO_MS;
    setTimeout(() => { if (rec.state === "recording") rec.stop(); }, duracao);
  }

  async function enviarExcertoReuniao(blob, indice) {
    if (blob.size < 500) return;  // excerto demasiado curto/silêncio, ignora
    try {
      const dados = new FormData();
      dados.append("utilizador", UTILIZADOR);
      dados.append("sessao", sessao);
      dados.append("indice", indice);
      dados.append("audio", blob, "excerto.webm");
      const resp = await fetch("/alma/reuniao/chunk", { method: "POST", body: dados });

      if (resp.status === 409) return;  // a reunião já terminou entretanto
      if (!resp.ok) {
        console.error("Falha num excerto da reunião:", resp.status, resp.statusText);
        return;
      }

      const tipo = resp.headers.get("content-type") || "";
      if (tipo.startsWith("application/json")) {
        // não foi chamada (ou a Alma já estava a responder a outra chamada)
        // — nada a mostrar, mas conta como sinal de vida
        excertosProcessados++;
        atualizarEstadoReuniao();
        return;
      }

      // uma nova chamada corta imediatamente a fala de uma resposta
      // anterior ainda a decorrer (o servidor já a interrompeu por si; aqui
      // só se cala o áudio que já tinha sido enviado antes disso)
      pararReproducaoAudio();
      respondendoAtivo = true;
      atualizarEstadoReuniao();
      const minhaGeracaoCliente = ++geracaoRespostaCliente;
      try {
        let msg = null;
        let textoCompleto = "";
        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let bufferSSE = "";
        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          bufferSSE += decoder.decode(value, { stream: true });
          const linhas = bufferSSE.split("\n\n");
          bufferSSE = linhas.pop();
          for (const linha of linhas) {
            if (!linha.startsWith("data: ")) continue;
            let ev;
            try { ev = JSON.parse(linha.slice(6)); } catch (_) { continue; }
            if (ev.transcricao) {
              addMessage("user", ev.transcricao);
              addTyping();
            } else if (ev.delta) {
              if (!msg) { removeTyping(); msg = addMessage("assistant", ""); }
              textoCompleto += ev.delta;
              msg.atualizar(textoCompleto);
            } else if (ev.audio) {
              // se entretanto já começou outra resposta, este áudio é de
              // uma fala já interrompida — não deve voltar a tocar
              if (minhaGeracaoCliente === geracaoRespostaCliente) enfileirarAudio(ev.audio);
            } else if (ev.erro) {
              removeTyping();
              addMessage("error", "Erro ao contactar a Alma: " + ev.erro);
            } else if (ev.a_processar) {
              marcarAProcessar();
            }
          }
        }
        fetchSessions();
      } finally {
        // só a chamada mais recente pode voltar a marcar "a ouvir" — uma
        // chamada antiga que acabou de ser interrompida não deve apagar o
        // estado "a responder" de uma chamada mais nova, ainda em curso
        if (minhaGeracaoCliente === geracaoRespostaCliente) respondendoAtivo = false;
        excertosProcessados++;
        atualizarEstadoReuniao();
      }
    } catch (err) {
      console.error("Falha de rede num excerto da reunião:", err);
    }
  }

  function pararModoReuniao() {
    if (!reuniaoAtiva) return;
    reuniaoAtiva = false;
    if (reuniaoRecorder && reuniaoRecorder.state === "recording") reuniaoRecorder.stop();
    else if (reuniaoStreamMic) {
      reuniaoStreamMic.getTracks().forEach((t) => t.stop());
      reuniaoStreamMic = null;
    }
    reuniaoBtn.classList.remove("a-gravar");
    reuniaoBtn.textContent = "🎙️";
    reuniaoBanner.hidden = true;
    terminarModoReuniao();
  }

  async function terminarModoReuniao() {
    addTyping();
    try {
      const resp = await fetch("/alma/reuniao/terminar", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: new URLSearchParams({ utilizador: UTILIZADOR, sessao })
      });
      removeTyping();
      if (!resp.ok) {
        addMessage("error", "Não consegui gerar o resumo da reunião.");
        return;
      }
      const data = await resp.json();
      addMessage("assistant", data.resumo || "(sem resumo)");
      fetchSessions();
    } catch (err) {
      removeTyping();
      addMessage("error", "Falha de rede ao terminar a reunião: " + err.message);
    }
  }

  reuniaoBtn.addEventListener("click", () => {
    if (reuniaoAtiva) pararModoReuniao();
    else iniciarModoReuniao();
  });
  reuniaoTerminarBtn.addEventListener("click", pararModoReuniao);

  function scrollToBottom() {
    scrollContainer.scrollTop = scrollContainer.scrollHeight;
  }

  function escapeHtml(str) {
    return str
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");
  }

  function splitTableRow(line) {
    let l = line.trim();
    if (l.startsWith("|")) l = l.slice(1);
    if (l.endsWith("|")) l = l.slice(0, -1);
    return l.split("|").map(c => c.trim());
  }

  function isTableSeparator(line) {
    const cells = splitTableRow(line);
    return cells.length > 0 && cells.every(c => /^:?-+:?$/.test(c));
  }

  function renderTable(header, rows) {
    let html = '<div class="table-wrap"><table><thead><tr>';
    header.forEach(h => { html += `<th>${h}</th>`; });
    html += "</tr></thead><tbody>";
    rows.forEach(r => {
      html += "<tr>";
      header.forEach((_, i) => { html += `<td>${r[i] !== undefined ? r[i] : ""}</td>`; });
      html += "</tr>";
    });
    html += "</tbody></table></div>";
    return html;
  }

  // Interpretador minimal de markdown: negrito, itálico, código (inline e blocos),
  // links, títulos, listas e tabelas — o suficiente para as respostas da Alma.
  function renderMarkdown(raw) {
    const codeBlocks = [];
    let text = raw.replace(/```[a-zA-Z0-9]*\n?([\s\S]*?)```/g, (_, code) => {
      codeBlocks.push(`<pre><code>${escapeHtml(code.replace(/\n$/, ""))}</code></pre>`);
      return `@@CODEBLOCK${codeBlocks.length - 1}@@`;
    });

    text = escapeHtml(text);

    text = text.replace(/`([^`\n]+)`/g, (_, code) => `<code>${code}</code>`);
    text = text.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g,
      (_, label, url) => `<a href="${url}" target="_blank" rel="noopener noreferrer">${label}</a>`);
    text = text.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
    text = text.replace(/__([^_]+)__/g, "<strong>$1</strong>");
    text = text.replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g, "$1<em>$2</em>");
    text = text.replace(/(^|[^_])_([^_\n]+)_(?!_)/g, "$1<em>$2</em>");

    const lines = text.split("\n");
    let html = "";
    let inUl = false, inOl = false, paraLines = [];

    const flushPara = () => {
      if (paraLines.length) {
        html += `<p>${paraLines.join("<br>")}</p>`;
        paraLines = [];
      }
    };
    const closeLists = () => {
      if (inUl) { html += "</ul>"; inUl = false; }
      if (inOl) { html += "</ol>"; inOl = false; }
    };

    let i = 0;
    while (i < lines.length) {
      const line = lines[i];
      const trimmed = line.trim();
      const codeBlockMatch = trimmed.match(/^@@CODEBLOCK(\d+)@@$/);
      const headerMatch = trimmed.match(/^(#{1,3})\s+(.*)/);
      const ulMatch = trimmed.match(/^[-*]\s+(.*)/);
      const olMatch = trimmed.match(/^\d+\.\s+(.*)/);
      const looksLikeTable = trimmed.includes("|") && i + 1 < lines.length && isTableSeparator(lines[i + 1].trim());

      if (looksLikeTable) {
        flushPara();
        closeLists();
        const header = splitTableRow(trimmed);
        const rows = [];
        i += 2;
        while (i < lines.length && lines[i].trim().includes("|")) {
          rows.push(splitTableRow(lines[i].trim()));
          i++;
        }
        html += renderTable(header, rows);
        continue;
      }
      if (!trimmed) {
        flushPara();
        closeLists();
      } else if (codeBlockMatch) {
        flushPara();
        closeLists();
        html += codeBlocks[Number(codeBlockMatch[1])];
      } else if (headerMatch) {
        flushPara();
        closeLists();
        const level = headerMatch[1].length + 2;
        html += `<h${level}>${headerMatch[2]}</h${level}>`;
      } else if (ulMatch) {
        flushPara();
        if (inOl) { html += "</ol>"; inOl = false; }
        if (!inUl) { html += "<ul>"; inUl = true; }
        html += `<li>${ulMatch[1]}</li>`;
      } else if (olMatch) {
        flushPara();
        if (inUl) { html += "</ul>"; inUl = false; }
        if (!inOl) { html += "<ol>"; inOl = true; }
        html += `<li>${olMatch[1]}</li>`;
      } else {
        closeLists();
        paraLines.push(line);
      }
      i++;
    }
    flushPara();
    closeLists();
    return html;
  }

  function resetMessages() {
    messagesInner.innerHTML = '<div class="empty-state">Escreve uma pergunta para começares a testar a Alma.</div>';
  }

  function makeAvatar(role) {
    const avatar = document.createElement("div");
    avatar.className = "avatar";
    if (role === "assistant") {
      const img = document.createElement("img");
      img.src = "/avatar.jpg";
      img.alt = "Alma";
      avatar.appendChild(img);
    } else {
      avatar.textContent = role === "user" ? "Tu" : "!";
    }
    return avatar;
  }

  function copiarParaClipboard(texto) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      return navigator.clipboard.writeText(texto);
    }
    // recurso para contextos sem a Clipboard API (ex: http não seguro)
    return new Promise((resolve, reject) => {
      const textarea = document.createElement("textarea");
      textarea.value = texto;
      textarea.style.position = "fixed";
      textarea.style.opacity = "0";
      document.body.appendChild(textarea);
      textarea.select();
      try {
        document.execCommand("copy");
        resolve();
      } catch (err) {
        reject(err);
      } finally {
        document.body.removeChild(textarea);
      }
    });
  }

  function criarBarraAcoes(obterTexto) {
    const barra = document.createElement("div");
    barra.className = "msg-actions";

    const copiarBtn = document.createElement("button");
    copiarBtn.type = "button";
    copiarBtn.className = "msg-action-btn";
    copiarBtn.textContent = "📋";
    copiarBtn.title = "Copiar mensagem";
    copiarBtn.addEventListener("click", async () => {
      try {
        await copiarParaClipboard(obterTexto());
        copiarBtn.textContent = "✓";
        setTimeout(() => { copiarBtn.textContent = "📋"; }, 1200);
      } catch (_) { /* falha silenciosa — o botão simplesmente não muda */ }
    });
    barra.appendChild(copiarBtn);

    if (navigator.share) {
      const partilharBtn = document.createElement("button");
      partilharBtn.type = "button";
      partilharBtn.className = "msg-action-btn";
      partilharBtn.textContent = "⤴";
      partilharBtn.title = "Partilhar mensagem";
      partilharBtn.addEventListener("click", () => {
        navigator.share({ text: obterTexto() }).catch(() => {});
      });
      barra.appendChild(partilharBtn);
    }

    return barra;
  }

  // devolve { bubble, atualizar(novoTexto) } — usado tal e qual para mensagens
  // normais (texto fixo) e para respostas em streaming (texto vai crescendo).
  // `imagens` (opcional): lista de { url, nome } — mostra as imagens
  // anexadas como miniaturas reais, em vez de só o nome do ficheiro em
  // texto (só usado ao enviar um anexo, nunca em respostas da Alma).
  function addMessage(role, text, imagens) {
    const emptyState = messagesInner.querySelector(".empty-state");
    if (emptyState) emptyState.remove();
    const wrap = document.createElement("div");
    wrap.className = "msg " + role;
    let textoAtual = text;
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    function renderizar() {
      if (role === "assistant") {
        bubble.innerHTML = renderMarkdown(textoAtual);
      } else {
        bubble.textContent = textoAtual;
      }
    }
    renderizar();
    const content = document.createElement("div");
    content.className = "msg-content";
    if (imagens && imagens.length) {
      const galeria = document.createElement("div");
      galeria.className = "anexos-imagem";
      imagens.forEach(img => {
        const el = document.createElement("img");
        el.src = img.url;
        el.alt = img.nome;
        el.className = "anexo-imagem-preview";
        el.title = img.nome + " (clica para ver em tamanho real)";
        el.addEventListener("click", () => window.open(img.url, "_blank"));
        galeria.appendChild(el);
      });
      content.appendChild(galeria);
    }
    if (textoAtual) {
      content.appendChild(bubble);
    }
    let barra = null;
    if (role === "user" || role === "assistant") {
      barra = criarBarraAcoes(() => textoAtual);
      content.appendChild(barra);
    }
    wrap.appendChild(makeAvatar(role));
    wrap.appendChild(content);
    messagesInner.appendChild(wrap);
    scrollToBottom();
    return {
      bubble,
      atualizar(novoTexto) {
        textoAtual = novoTexto;
        renderizar();
        if (!bubble.isConnected && textoAtual) {
          if (barra) content.insertBefore(bubble, barra);
          else content.appendChild(bubble);
        }
        scrollToBottom();
      }
    };
  }

  function addTyping() {
    const emptyState = messagesInner.querySelector(".empty-state");
    if (emptyState) emptyState.remove();
    const wrap = document.createElement("div");
    wrap.className = "msg assistant";
    wrap.id = "typing-indicator";
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML = '<span class="typing-wrap"><span class="typing-label"></span>'
      + '<span class="typing"><span></span><span></span><span></span></span></span>';
    wrap.appendChild(makeAvatar("assistant"));
    wrap.appendChild(bubble);
    messagesInner.appendChild(wrap);
    scrollToBottom();
  }

  function removeTyping() {
    const el = document.getElementById("typing-indicator");
    if (el) el.remove();
  }

  // chamado quando chega um sinal de vida (a_processar) a meio de uma
  // resposta ainda a demorar — sem isto, os três pontinhos ficam iguais do
  // início ao fim e parece que a Alma não está a fazer nada, mesmo quando
  // está a consultar o Basecamp ou outra ferramenta.
  function marcarAProcessar() {
    const el = document.getElementById("typing-indicator");
    if (!el) return;
    const label = el.querySelector(".typing-label");
    if (label) label.textContent = "A analisar…";
  }

  menuToggle.addEventListener("click", () => {
    if (sidebar.classList.contains("collapsed")) abrirSidebar();
    else fecharSidebar();
  });

  async function fetchSessions() {
    try {
      const resp = await fetch(`/sessoes?utilizador=${encodeURIComponent(UTILIZADOR)}`);
      if (!resp.ok) return;
      renderSessionsList(await resp.json());
    } catch (_) { /* histórico é acessório; falhas silenciosas não bloqueiam o chat */ }
  }

  function renderSessionsList(lista) {
    sessionsList.innerHTML = "";
    if (!lista.length) {
      sessionsList.innerHTML = '<div class="sessions-empty">Sem conversas anteriores.</div>';
      return;
    }
    lista.forEach(s => {
      const item = document.createElement("div");
      item.className = "session-item" + (s.sessao === sessao ? " active" : "");
      item.title = s.preview || s.sessao;
      item.addEventListener("click", () => switchSession(s.sessao));

      const titulo = document.createElement("span");
      titulo.className = "session-title";
      titulo.textContent = s.preview || s.sessao;
      item.appendChild(titulo);

      const apagar = document.createElement("button");
      apagar.className = "delete-btn";
      apagar.type = "button";
      apagar.textContent = "✕";
      apagar.title = "Eliminar conversa";
      apagar.addEventListener("click", (e) => {
        e.stopPropagation();
        eliminarSessao(s.sessao);
      });
      item.appendChild(apagar);

      sessionsList.appendChild(item);
    });
  }

  async function eliminarSessao(sessaoAlvo) {
    if (!confirm("Eliminar esta conversa? Não é possível recuperar depois.")) return;
    try {
      await fetch(`/sessoes/${encodeURIComponent(sessaoAlvo)}?utilizador=${encodeURIComponent(UTILIZADOR)}`,
        { method: "DELETE" });
    } catch (_) { /* segue para atualizar a UI mesmo que o pedido falhe */ }
    if (sessaoAlvo === sessao) {
      novaConversa();
    } else {
      fetchSessions();
    }
  }

  async function switchSession(novaSessao) {
    if (reuniaoAtiva) pararModoReuniao();
    if (isMobile()) fecharSidebar();
    sessao = novaSessao;
    sessionStorage.setItem("alma_sessao", sessao);
    sessaoLabel.value = sessao;
    messagesInner.innerHTML = '<div class="empty-state">A carregar histórico…</div>';
    try {
      const resp = await fetch(`/historico/${encodeURIComponent(sessao)}?utilizador=${encodeURIComponent(UTILIZADOR)}`);
      const historico = resp.ok ? await resp.json() : [];
      resetMessages();
      historico.forEach(m => addMessage(m.role === "assistant" ? "assistant" : "user", m.content));
    } catch (_) {
      resetMessages();
    }
    fetchSessions();
  }

  function novaConversa() {
    if (reuniaoAtiva) pararModoReuniao();
    if (isMobile()) fecharSidebar();
    sessao = "web-" + Math.random().toString(36).slice(2, 10);
    sessionStorage.setItem("alma_sessao", sessao);
    sessaoLabel.value = sessao;
    resetMessages();
    fetchSessions();
    input.focus();
  }
  newChatBtn.addEventListener("click", novaConversa);

  // no telemóvel, o autofocus do <textarea> abre o teclado logo ao carregar a
  // página — o browser aplica-o de forma assíncrona (depois deste script
  // correr), por isso um blur() a direito perde sempre a corrida. Em vez de
  // adivinhar o timing, suprime-se qualquer foco no campo até o utilizador
  // interagir mesmo com a página pela primeira vez.
  let interagiuComAPagina = false;
  document.addEventListener("pointerdown", () => { interagiuComAPagina = true; }, { once: true, capture: true });
  input.addEventListener("focus", () => {
    if (isMobile() && !interagiuComAPagina) input.blur();
  });

  input.addEventListener("input", () => {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 160) + "px";
  });

  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      form.requestSubmit();
    }
  });

  anexarBtn.addEventListener("click", () => ficheiroInput.click());

  function renderAnexos() {
    anexoChips.innerHTML = "";
    ficheirosAnexados.forEach((ficheiro, i) => {
      const chip = document.createElement("div");
      chip.className = "anexo-chip";
      const nome = document.createElement("span");
      nome.textContent = "📎 " + ficheiro.name;
      const remover = document.createElement("button");
      remover.type = "button";
      remover.setAttribute("aria-label", "Remover anexo");
      remover.textContent = "✕";
      remover.addEventListener("click", () => {
        ficheirosAnexados.splice(i, 1);
        renderAnexos();
      });
      chip.append(nome, remover);
      anexoChips.appendChild(chip);
    });
  }

  ficheiroInput.addEventListener("change", () => {
    // acumula com o que já estava anexado — permite ir adicionando
    // ficheiros em vários cliques no clip, não só um de cada vez
    for (const ficheiro of ficheiroInput.files) {
      if (ficheiro.size > 15 * 1024 * 1024) {
        addMessage("error", `Ficheiro demasiado grande (máx. 15 MB): ${ficheiro.name}`);
        continue;
      }
      ficheirosAnexados.push(ficheiro);
    }
    ficheiroInput.value = "";  // permite voltar a escolher o mesmo ficheiro depois de o remover
    renderAnexos();
  });

  function limparAnexo() {
    ficheirosAnexados = [];
    ficheiroInput.value = "";
    renderAnexos();
  }

  const EXTENSOES_IMAGEM = [".jpg", ".jpeg", ".png", ".gif", ".webp"];
  function ehImagem(ficheiro) {
    if (ficheiro.type && ficheiro.type.startsWith("image/")) return true;
    const nome = ficheiro.name.toLowerCase();
    return EXTENSOES_IMAGEM.some(ext => nome.endsWith(ext));
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const mensagem = input.value.trim();
    const ficheiros = ficheirosAnexados;
    if (!mensagem && ficheiros.length === 0) return;

    // imagens aparecem como miniaturas reais na conversa; outros ficheiros
    // continuam a aparecer só pelo nome (não há como pré-visualizar um PDF
    // ou Word do mesmo modo)
    const imagensAnexadas = ficheiros.filter(ehImagem).map(f => ({ url: URL.createObjectURL(f), nome: f.name }));
    const nomesOutros = ficheiros.filter(f => !ehImagem(f)).map(f => `📎 ${f.name}\n`).join("");
    addMessage("user", nomesOutros + mensagem, imagensAnexadas);
    input.value = "";
    input.style.height = "auto";
    limparAnexo();
    input.disabled = true;
    sendBtn.disabled = true;
    anexarBtn.disabled = true;
    addTyping();

    try {
      if (ficheiros.length > 0) {
        const dados = new FormData();
        dados.append("utilizador", UTILIZADOR);
        dados.append("sessao", sessao);
        dados.append("mensagem", mensagem);
        ficheiros.forEach(f => dados.append("ficheiros", f));
        const resp = await fetch("/alma/ficheiro", { method: "POST", body: dados });
        removeTyping();
        if (!resp.ok) {
          let detalhe = resp.status + " " + resp.statusText;
          try {
            const err = await resp.json();
            if (err.detail) detalhe = err.detail;
          } catch (_) {}
          addMessage("error", "Erro ao contactar a Alma: " + detalhe);
        } else {
          const data = await resp.json();
          addMessage("assistant", data.resposta || "(sem resposta)");
          fetchSessions();
        }
      } else {
        const resp = await fetch("/alma/stream", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ utilizador: UTILIZADOR, sessao, mensagem })
        });

        if (!resp.ok) {
          removeTyping();
          let detalhe = resp.status + " " + resp.statusText;
          try {
            const err = await resp.json();
            if (err.detail) detalhe = err.detail;
          } catch (_) {}
          addMessage("error", "Erro ao contactar a Alma: " + detalhe);
        } else {
          // a resposta chega em pedaços (SSE) — a bolha só aparece quando o
          // primeiro pedaço de texto chegar, o indicador "a escrever" fica
          // visível até lá
          let msg = null;
          let textoCompleto = "";
          let erro = null;
          const reader = resp.body.getReader();
          const decoder = new TextDecoder();
          let bufferSSE = "";
          while (true) {
            const { value, done } = await reader.read();
            if (done) break;
            bufferSSE += decoder.decode(value, { stream: true });
            const linhas = bufferSSE.split("\n\n");
            bufferSSE = linhas.pop();  // pedaço incompleto fica para a próxima leitura
            for (const linha of linhas) {
              if (!linha.startsWith("data: ")) continue;
              let dados;
              try { dados = JSON.parse(linha.slice(6)); } catch (_) { continue; }
              if (dados.delta) {
                if (!msg) { removeTyping(); msg = addMessage("assistant", ""); }
                textoCompleto += dados.delta;
                msg.atualizar(textoCompleto);
              } else if (dados.erro) {
                erro = dados.erro;
              } else if (dados.a_processar) {
                marcarAProcessar();
              }
            }
          }
          if (erro) {
            removeTyping();
            addMessage("error", "Erro ao contactar a Alma: " + erro);
          } else if (!msg) {
            removeTyping();
            addMessage("assistant", "(sem resposta)");
          }
          fetchSessions();
        }
      }
    } catch (err) {
      removeTyping();
      addMessage("error", "Falha de rede: " + err.message);
    } finally {
      input.disabled = false;
      sendBtn.disabled = false;
      anexarBtn.disabled = false;
      input.focus();
    }
  });

  function iniciar() {
    utilizadorLabel.textContent = UTILIZADOR;
    switchSession(sessao);
  }

  if (UTILIZADOR) {
    iniciar();
  } else {
    const overlay = document.getElementById("identidade-overlay");
    const identidadeForm = document.getElementById("identidade-form");
    const identidadeVideo = overlay.querySelector("video");
    overlay.hidden = false;
    identidadeForm.addEventListener("submit", (e) => {
      e.preventDefault();
      const nome = document.getElementById("identidade-input").value.trim();
      if (!nome) return;
      UTILIZADOR = nome;
      localStorage.setItem("alma_utilizador", nome);
      identidadeVideo.pause();
      identidadeVideo.removeAttribute("src");
      identidadeVideo.load();
      overlay.remove();
      iniciar();
    });
  }
})();
</script>
</body>
</html>
