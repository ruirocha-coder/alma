<!doctype html>
<html lang="pt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Alma — consola de teste</title>
<style>
  :root {
    --bg: #f7f6f3;
    --panel: #ffffff;
    --text: #2b2926;
    --text-dim: #6b6862;
    --border: #e6e3dd;
    --accent: #c3684a;
    --accent-text: #ffffff;
    --bubble-user: #eeece7;
    --bubble-assistant: #ffffff;
    --error: #b3413a;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1d1c1a;
      --panel: #262523;
      --text: #ece9e4;
      --text-dim: #9a968f;
      --border: #3a3835;
      --accent: #d97757;
      --accent-text: #1d1c1a;
      --bubble-user: #333130;
      --bubble-assistant: #262523;
      --error: #e08078;
    }
  }
  * { box-sizing: border-box; }
  html, body {
    height: 100%;
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }
  #app {
    max-width: 720px;
    margin: 0 auto;
    height: 100%;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  header .logo {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    background: var(--accent);
    color: var(--accent-text);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 14px;
  }
  header h1 {
    font-size: 15px;
    font-weight: 600;
    margin: 0;
  }
  header .sub {
    font-size: 12px;
    color: var(--text-dim);
    margin-left: auto;
  }
  header input {
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-size: 12px;
    text-align: right;
    width: 90px;
  }
  header input:focus { outline: none; color: var(--text); }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px 8px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  .empty-state {
    margin: auto;
    text-align: center;
    color: var(--text-dim);
    font-size: 14px;
  }
  .msg {
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }
  .msg .avatar {
    width: 26px;
    height: 26px;
    border-radius: 7px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    margin-top: 2px;
  }
  .msg.user .avatar { background: var(--bubble-user); color: var(--text); }
  .msg.assistant .avatar { background: var(--accent); color: var(--accent-text); }
  .bubble {
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 14.5px;
    line-height: 1.55;
    white-space: pre-wrap;
    word-wrap: break-word;
    max-width: 100%;
  }
  .msg.user .bubble { background: var(--bubble-user); }
  .msg.assistant .bubble { background: var(--bubble-assistant); border: 1px solid var(--border); }
  .msg.error .bubble { background: transparent; border: 1px solid var(--error); color: var(--error); }

  .typing {
    display: inline-flex;
    gap: 4px;
    padding: 4px 0;
  }
  .typing span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-dim);
    animation: bounce 1.2s infinite ease-in-out;
  }
  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-4px); opacity: 1; }
  }

  #composer {
    padding: 14px 20px 20px;
    flex-shrink: 0;
  }
  #composer form {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 8px 8px 8px 16px;
  }
  #composer textarea {
    flex: 1;
    border: none;
    resize: none;
    background: transparent;
    color: var(--text);
    font-family: inherit;
    font-size: 14.5px;
    line-height: 1.5;
    max-height: 160px;
    padding: 6px 0;
  }
  #composer textarea:focus { outline: none; }
  #composer button {
    border: none;
    background: var(--accent);
    color: var(--accent-text);
    width: 34px;
    height: 34px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  #composer button:disabled { opacity: 0.4; cursor: default; }
  #composer .hint {
    text-align: center;
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 8px;
  }
</style>
</head>
<body>
  <div id="app">
    <header>
      <div class="logo">A</div>
      <h1>Alma — consola de teste</h1>
      <span class="sub">sessão <input id="sessao-label" type="text" readonly></span>
    </header>
    <div id="messages">
      <div class="empty-state" id="empty-state">Escreve uma pergunta para começares a testar a Alma.</div>
    </div>
    <div id="composer">
      <form id="form">
        <textarea id="input" rows="1" placeholder="Escreve uma mensagem..." autofocus></textarea>
        <button id="send" type="submit" aria-label="Enviar">➤</button>
      </form>
      <div class="hint">Enter para enviar · Shift+Enter para nova linha</div>
    </div>
  </div>

<script>
(function () {
  const API_URL = "/alma";
  const UTILIZADOR = "console-teste";

  let sessao = sessionStorage.getItem("alma_sessao");
  if (!sessao) {
    sessao = "web-" + Math.random().toString(36).slice(2, 10);
    sessionStorage.setItem("alma_sessao", sessao);
  }
  document.getElementById("sessao-label").value = sessao;

  const messagesEl = document.getElementById("messages");
  const emptyState = document.getElementById("empty-state");
  const form = document.getElementById("form");
  const input = document.getElementById("input");
  const sendBtn = document.getElementById("send");

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function addMessage(role, text) {
    if (emptyState) emptyState.remove();
    const wrap = document.createElement("div");
    wrap.className = "msg " + role;
    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = role === "user" ? "Tu" : (role === "error" ? "!" : "A");
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;
    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    scrollToBottom();
    return bubble;
  }

  function addTyping() {
    if (emptyState) emptyState.remove();
    const wrap = document.createElement("div");
    wrap.className = "msg assistant";
    wrap.id = "typing-indicator";
    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = "A";
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML = '<span class="typing"><span></span><span></span><span></span></span>';
    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    scrollToBottom();
  }

  function removeTyping() {
    const el = document.getElementById("typing-indicator");
    if (el) el.remove();
  }

  input.addEventListener("input", () => {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 160) + "px";
  });

  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      form.requestSubmit();
    }
  });

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const mensagem = input.value.trim();
    if (!mensagem) return;

    addMessage("user", mensagem);
    input.value = "";
    input.style.height = "auto";
    input.disabled = true;
    sendBtn.disabled = true;
    addTyping();

    try {
      const resp = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ utilizador: UTILIZADOR, sessao, mensagem })
      });

      removeTyping();

      if (!resp.ok) {
        let detalhe = resp.status + " " + resp.statusText;
        try {
          const err = await resp.json();
          if (err.detail) detalhe = err.detail;
        } catch (_) {}
        addMessage("error", "Erro ao contactar a Alma: " + detalhe);
      } else {
        const data = await resp.json();
        addMessage("assistant", data.resposta || "(sem resposta)");
      }
    } catch (err) {
      removeTyping();
      addMessage("error", "Falha de rede: " + err.message);
    } finally {
      input.disabled = false;
      sendBtn.disabled = false;
      input.focus();
    }
  });
})();
</script>
</body>
</html>
