<!doctype html>
<html lang="pt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Alma</title>
<link rel="icon" type="image/jpeg" href="/avatar.jpg">
<style>
  :root {
    --bg: #f7f6f3;
    --panel: #ffffff;
    --sidebar: #efece6;
    --text: #2b2926;
    --text-dim: #6b6862;
    --border: #e6e3dd;
    --accent: #c3684a;
    --accent-text: #ffffff;
    --bubble-user: #eeece7;
    --bubble-assistant: #ffffff;
    --error: #b3413a;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1d1c1a;
      --panel: #262523;
      --sidebar: #201f1d;
      --text: #ece9e4;
      --text-dim: #9a968f;
      --border: #3a3835;
      --accent: #d97757;
      --accent-text: #1d1c1a;
      --bubble-user: #333130;
      --bubble-assistant: #262523;
      --error: #e08078;
    }
  }
  * { box-sizing: border-box; }
  html, body {
    height: 100%;
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }
  #app {
    height: 100%;
    display: flex;
  }

  #sidebar {
    width: 260px;
    flex-shrink: 0;
    overflow: hidden;
    background: var(--sidebar);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    transition: width 0.18s ease, border-color 0.18s ease;
  }
  #sidebar.collapsed { width: 0; border-color: transparent; }
  #sidebar > * { width: 260px; flex-shrink: 0; }
  .new-chat {
    margin: 14px;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    cursor: pointer;
    font-size: 13.5px;
    font-family: inherit;
    text-align: left;
  }
  .new-chat:hover { background: var(--bubble-user); }
  #sessions-list {
    flex: 1;
    overflow-y: auto;
    padding: 0 8px 12px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .session-item {
    padding: 9px 10px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .session-item:hover { background: var(--bubble-user); color: var(--text); }
  .session-item.active { background: var(--bubble-user); color: var(--text); font-weight: 600; }
  .sessions-empty {
    padding: 10px 14px;
    font-size: 12px;
    color: var(--text-dim);
  }

  #main-col {
    flex: 1;
    min-width: 0;
    height: 100%;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .icon-btn {
    border: none;
    background: transparent;
    color: var(--text-dim);
    font-size: 16px;
    cursor: pointer;
    padding: 4px 6px;
    border-radius: 6px;
    line-height: 1;
  }
  .icon-btn:hover { background: var(--bubble-user); color: var(--text); }
  header .logo {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    object-fit: cover;
    display: block;
  }
  header h1 {
    font-size: 15px;
    font-weight: 600;
    margin: 0;
  }
  header .sub {
    font-size: 12px;
    color: var(--text-dim);
    margin-left: auto;
  }
  header input {
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-size: 12px;
    text-align: right;
    width: 90px;
  }
  header input:focus { outline: none; color: var(--text); }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px 8px;
  }
  #messages-inner {
    max-width: 720px;
    margin: 0 auto;
    min-height: 100%;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  .empty-state {
    margin: auto;
    text-align: center;
    color: var(--text-dim);
    font-size: 14px;
  }
  .msg {
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }
  .msg .avatar {
    width: 26px;
    height: 26px;
    border-radius: 7px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    margin-top: 2px;
    overflow: hidden;
  }
  .msg .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .msg.user .avatar { background: var(--bubble-user); color: var(--text); }
  .msg.assistant .avatar { background: var(--accent); color: var(--accent-text); }
  .bubble {
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 14.5px;
    line-height: 1.55;
    white-space: pre-wrap;
    word-wrap: break-word;
    max-width: 100%;
  }
  .msg.user .bubble { background: var(--bubble-user); }
  .msg.assistant .bubble { background: var(--bubble-assistant); border: 1px solid var(--border); }
  .msg.error .bubble { background: transparent; border: 1px solid var(--error); color: var(--error); }

  .bubble p { margin: 0 0 8px; }
  .bubble p:last-child { margin-bottom: 0; }
  .bubble ul, .bubble ol { margin: 4px 0 8px; padding-left: 22px; }
  .bubble li { margin-bottom: 3px; }
  .bubble h3, .bubble h4, .bubble h5 { margin: 10px 0 4px; font-size: 1em; }
  .bubble strong { font-weight: 700; }
  .bubble a { color: var(--accent); }
  .bubble code {
    background: var(--bubble-user);
    padding: 1px 5px;
    border-radius: 4px;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 0.9em;
  }
  .bubble pre {
    background: var(--bubble-user);
    padding: 10px 12px;
    border-radius: 8px;
    overflow-x: auto;
    margin: 6px 0;
  }
  .bubble pre code { background: none; padding: 0; }
  .bubble .table-wrap {
    overflow-x: auto;
    margin: 6px 0;
  }
  .bubble table {
    border-collapse: collapse;
    width: 100%;
    font-size: 0.92em;
    white-space: normal;
  }
  .bubble th, .bubble td {
    border: 1px solid var(--border);
    padding: 6px 10px;
    text-align: left;
  }
  .bubble th { background: var(--bubble-user); font-weight: 600; }

  .typing {
    display: inline-flex;
    gap: 4px;
    padding: 4px 0;
  }
  .typing span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-dim);
    animation: bounce 1.2s infinite ease-in-out;
  }
  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-4px); opacity: 1; }
  }

  #composer {
    padding: 14px 20px 20px;
    flex-shrink: 0;
  }
  .composer-inner {
    max-width: 720px;
    margin: 0 auto;
  }
  #composer form {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 8px 8px 8px 16px;
  }
  #composer textarea {
    flex: 1;
    border: none;
    resize: none;
    background: transparent;
    color: var(--text);
    font-family: inherit;
    font-size: 14.5px;
    line-height: 1.5;
    max-height: 160px;
    padding: 6px 0;
  }
  #composer textarea:focus { outline: none; }
  #composer button {
    border: none;
    background: var(--accent);
    color: var(--accent-text);
    width: 34px;
    height: 34px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  #composer button:disabled { opacity: 0.4; cursor: default; }
  #composer .hint {
    text-align: center;
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 8px;
  }
</style>
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <button id="new-chat" class="new-chat" type="button">+ Nova conversa</button>
      <div id="sessions-list">
        <div class="sessions-empty">Sem conversas anteriores.</div>
      </div>
    </aside>
    <div id="main-col">
      <header>
        <button id="menu-toggle" class="icon-btn" type="button" aria-label="Mostrar/ocultar histórico">☰</button>
        <img class="logo" src="/avatar.jpg" alt="Alma">
        <h1>Alma</h1>
        <span class="sub">sessão <input id="sessao-label" type="text" readonly></span>
      </header>
      <div id="messages">
        <div id="messages-inner">
          <div class="empty-state">Escreve uma pergunta para começares a testar a Alma.</div>
        </div>
      </div>
      <div id="composer">
        <div class="composer-inner">
          <form id="form">
            <textarea id="input" rows="1" placeholder="Escreve uma mensagem..." autofocus></textarea>
            <button id="send" type="submit" aria-label="Enviar">➤</button>
          </form>
          <div class="hint">Enter para enviar · Shift+Enter para nova linha</div>
        </div>
      </div>
    </div>
  </div>

<script>
(function () {
  const API_URL = "/alma";
  const UTILIZADOR = "console-teste";

  let sessao = sessionStorage.getItem("alma_sessao");
  if (!sessao) {
    sessao = "web-" + Math.random().toString(36).slice(2, 10);
    sessionStorage.setItem("alma_sessao", sessao);
  }

  const scrollContainer = document.getElementById("messages");
  const messagesInner = document.getElementById("messages-inner");
  const form = document.getElementById("form");
  const input = document.getElementById("input");
  const sendBtn = document.getElementById("send");
  const sessaoLabel = document.getElementById("sessao-label");
  const sidebar = document.getElementById("sidebar");
  const menuToggle = document.getElementById("menu-toggle");
  const newChatBtn = document.getElementById("new-chat");
  const sessionsList = document.getElementById("sessions-list");

  function scrollToBottom() {
    scrollContainer.scrollTop = scrollContainer.scrollHeight;
  }

  function escapeHtml(str) {
    return str
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");
  }

  function splitTableRow(line) {
    let l = line.trim();
    if (l.startsWith("|")) l = l.slice(1);
    if (l.endsWith("|")) l = l.slice(0, -1);
    return l.split("|").map(c => c.trim());
  }

  function isTableSeparator(line) {
    const cells = splitTableRow(line);
    return cells.length > 0 && cells.every(c => /^:?-+:?$/.test(c));
  }

  function renderTable(header, rows) {
    let html = '<div class="table-wrap"><table><thead><tr>';
    header.forEach(h => { html += `<th>${h}</th>`; });
    html += "</tr></thead><tbody>";
    rows.forEach(r => {
      html += "<tr>";
      header.forEach((_, i) => { html += `<td>${r[i] !== undefined ? r[i] : ""}</td>`; });
      html += "</tr>";
    });
    html += "</tbody></table></div>";
    return html;
  }

  // Interpretador minimal de markdown: negrito, itálico, código (inline e blocos),
  // links, títulos, listas e tabelas — o suficiente para as respostas da Alma.
  function renderMarkdown(raw) {
    const codeBlocks = [];
    let text = raw.replace(/```[a-zA-Z0-9]*\n?([\s\S]*?)```/g, (_, code) => {
      codeBlocks.push(`<pre><code>${escapeHtml(code.replace(/\n$/, ""))}</code></pre>`);
      return `@@CODEBLOCK${codeBlocks.length - 1}@@`;
    });

    text = escapeHtml(text);

    text = text.replace(/`([^`\n]+)`/g, (_, code) => `<code>${code}</code>`);
    text = text.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g,
      (_, label, url) => `<a href="${url}" target="_blank" rel="noopener noreferrer">${label}</a>`);
    text = text.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
    text = text.replace(/__([^_]+)__/g, "<strong>$1</strong>");
    text = text.replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g, "$1<em>$2</em>");
    text = text.replace(/(^|[^_])_([^_\n]+)_(?!_)/g, "$1<em>$2</em>");

    const lines = text.split("\n");
    let html = "";
    let inUl = false, inOl = false, paraLines = [];

    const flushPara = () => {
      if (paraLines.length) {
        html += `<p>${paraLines.join("<br>")}</p>`;
        paraLines = [];
      }
    };
    const closeLists = () => {
      if (inUl) { html += "</ul>"; inUl = false; }
      if (inOl) { html += "</ol>"; inOl = false; }
    };

    let i = 0;
    while (i < lines.length) {
      const line = lines[i];
      const trimmed = line.trim();
      const codeBlockMatch = trimmed.match(/^@@CODEBLOCK(\d+)@@$/);
      const headerMatch = trimmed.match(/^(#{1,3})\s+(.*)/);
      const ulMatch = trimmed.match(/^[-*]\s+(.*)/);
      const olMatch = trimmed.match(/^\d+\.\s+(.*)/);
      const looksLikeTable = trimmed.includes("|") && i + 1 < lines.length && isTableSeparator(lines[i + 1].trim());

      if (looksLikeTable) {
        flushPara();
        closeLists();
        const header = splitTableRow(trimmed);
        const rows = [];
        i += 2;
        while (i < lines.length && lines[i].trim().includes("|")) {
          rows.push(splitTableRow(lines[i].trim()));
          i++;
        }
        html += renderTable(header, rows);
        continue;
      }
      if (!trimmed) {
        flushPara();
        closeLists();
      } else if (codeBlockMatch) {
        flushPara();
        closeLists();
        html += codeBlocks[Number(codeBlockMatch[1])];
      } else if (headerMatch) {
        flushPara();
        closeLists();
        const level = headerMatch[1].length + 2;
        html += `<h${level}>${headerMatch[2]}</h${level}>`;
      } else if (ulMatch) {
        flushPara();
        if (inOl) { html += "</ol>"; inOl = false; }
        if (!inUl) { html += "<ul>"; inUl = true; }
        html += `<li>${ulMatch[1]}</li>`;
      } else if (olMatch) {
        flushPara();
        if (inUl) { html += "</ul>"; inUl = false; }
        if (!inOl) { html += "<ol>"; inOl = true; }
        html += `<li>${olMatch[1]}</li>`;
      } else {
        closeLists();
        paraLines.push(line);
      }
      i++;
    }
    flushPara();
    closeLists();
    return html;
  }

  function resetMessages() {
    messagesInner.innerHTML = '<div class="empty-state">Escreve uma pergunta para começares a testar a Alma.</div>';
  }

  function makeAvatar(role) {
    const avatar = document.createElement("div");
    avatar.className = "avatar";
    if (role === "assistant") {
      const img = document.createElement("img");
      img.src = "/avatar.jpg";
      img.alt = "Alma";
      avatar.appendChild(img);
    } else {
      avatar.textContent = role === "user" ? "Tu" : "!";
    }
    return avatar;
  }

  function addMessage(role, text) {
    const emptyState = messagesInner.querySelector(".empty-state");
    if (emptyState) emptyState.remove();
    const wrap = document.createElement("div");
    wrap.className = "msg " + role;
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    if (role === "assistant") {
      bubble.innerHTML = renderMarkdown(text);
    } else {
      bubble.textContent = text;
    }
    wrap.appendChild(makeAvatar(role));
    wrap.appendChild(bubble);
    messagesInner.appendChild(wrap);
    scrollToBottom();
    return bubble;
  }

  function addTyping() {
    const emptyState = messagesInner.querySelector(".empty-state");
    if (emptyState) emptyState.remove();
    const wrap = document.createElement("div");
    wrap.className = "msg assistant";
    wrap.id = "typing-indicator";
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML = '<span class="typing"><span></span><span></span><span></span></span>';
    wrap.appendChild(makeAvatar("assistant"));
    wrap.appendChild(bubble);
    messagesInner.appendChild(wrap);
    scrollToBottom();
  }

  function removeTyping() {
    const el = document.getElementById("typing-indicator");
    if (el) el.remove();
  }

  menuToggle.addEventListener("click", () => sidebar.classList.toggle("collapsed"));

  async function fetchSessions() {
    try {
      const resp = await fetch(`/sessoes?utilizador=${encodeURIComponent(UTILIZADOR)}`);
      if (!resp.ok) return;
      renderSessionsList(await resp.json());
    } catch (_) { /* histórico é acessório; falhas silenciosas não bloqueiam o chat */ }
  }

  function renderSessionsList(lista) {
    sessionsList.innerHTML = "";
    if (!lista.length) {
      sessionsList.innerHTML = '<div class="sessions-empty">Sem conversas anteriores.</div>';
      return;
    }
    lista.forEach(s => {
      const item = document.createElement("div");
      item.className = "session-item" + (s.sessao === sessao ? " active" : "");
      item.textContent = s.preview || s.sessao;
      item.title = s.preview || s.sessao;
      item.addEventListener("click", () => switchSession(s.sessao));
      sessionsList.appendChild(item);
    });
  }

  async function switchSession(novaSessao) {
    sessao = novaSessao;
    sessionStorage.setItem("alma_sessao", sessao);
    sessaoLabel.value = sessao;
    messagesInner.innerHTML = '<div class="empty-state">A carregar histórico…</div>';
    try {
      const resp = await fetch(`/historico/${encodeURIComponent(sessao)}`);
      const historico = resp.ok ? await resp.json() : [];
      resetMessages();
      historico.forEach(m => addMessage(m.role === "assistant" ? "assistant" : "user", m.content));
    } catch (_) {
      resetMessages();
    }
    fetchSessions();
  }

  function novaConversa() {
    sessao = "web-" + Math.random().toString(36).slice(2, 10);
    sessionStorage.setItem("alma_sessao", sessao);
    sessaoLabel.value = sessao;
    resetMessages();
    fetchSessions();
    input.focus();
  }
  newChatBtn.addEventListener("click", novaConversa);

  input.addEventListener("input", () => {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 160) + "px";
  });

  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      form.requestSubmit();
    }
  });

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const mensagem = input.value.trim();
    if (!mensagem) return;

    addMessage("user", mensagem);
    input.value = "";
    input.style.height = "auto";
    input.disabled = true;
    sendBtn.disabled = true;
    addTyping();

    try {
      const resp = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ utilizador: UTILIZADOR, sessao, mensagem })
      });

      removeTyping();

      if (!resp.ok) {
        let detalhe = resp.status + " " + resp.statusText;
        try {
          const err = await resp.json();
          if (err.detail) detalhe = err.detail;
        } catch (_) {}
        addMessage("error", "Erro ao contactar a Alma: " + detalhe);
      } else {
        const data = await resp.json();
        addMessage("assistant", data.resposta || "(sem resposta)");
        fetchSessions();
      }
    } catch (err) {
      removeTyping();
      addMessage("error", "Falha de rede: " + err.message);
    } finally {
      input.disabled = false;
      sendBtn.disabled = false;
      input.focus();
    }
  });

  switchSession(sessao);
})();
</script>
</body>
</html>
